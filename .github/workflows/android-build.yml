name: Pake Android APP Build (最终修复版)
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'APP名称'
        required: true
        default: 'PakeApp'
      app_package:
        description: '包名'
        required: true
        default: 'com.xxx.pake'
      app_version:
        description: '版本号'
        required: true
        default: '1.0.0'

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi
          components: rust-src

      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 关键：先全局安装 pnpm，再执行后续命令
      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 安装项目依赖
        run: pnpm install

      - name: 配置APP + 绕过window.hide()
        run: |
          echo "TAURI_APP_TITLE=${{ inputs.app_name }}" > .env
          echo "TAURI_APP_VERSION=${{ inputs.app_version }}" >> .env
          echo "TAURI_ANDROID_PACKAGE_NAME=${{ inputs.app_package }}" >> .env
          sed -i 's/window.hide().unwrap();/\/\/ window.hide().unwrap();/g' src/lib.rs
          sed -i 's/window.show().unwrap();/\/\/ window.show().unwrap();/g' src/lib.rs

      - name: 初始化安卓工程
        run: pnpm tauri android init

      - name: 编译安卓APK
        run: pnpm tauri android build --release
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/25.2.9519653

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
