name: Pake Android APP Build (路径修正版)
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'APP名称'
        required: true
        default: 'PakeApp'
      app_package:
        description: '包名'
        required: true
        default: 'com.xxx.pake'
      app_version:
        description: '版本号'
        required: true
        default: '1.0.0'
      app_url:
        description: '要封装的网址'
        required: true
        default: 'https://你的APP网址'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: 配置Rust环境
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi
          components: rust-src

      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 全局安装pnpm
        run: npm install -g pnpm

      - name: 安装Pake依赖
        run: pnpm install

      - name: 写入APP配置（含网址）
        run: |
          echo "PAKE_URL=${{ github.event.inputs.app_url }}" > .env
          echo "PAKE_NAME=${{ github.event.inputs.app_name }}" >> .env
          echo "TAURI_APP_VERSION=${{ github.event.inputs.app_version }}" >> .env
          echo "TAURI_ANDROID_PACKAGE_NAME=${{ github.event.inputs.app_package }}" >> .env

      # ✅ 修复：Pake 真实 lib.rs 路径是 src-tauri/src/
      - name: 注释报错代码（修正路径）
        run: |
          sed -i 's/window.hide().unwrap();/\/\/ window.hide().unwrap();/' src-tauri/src/lib.rs
          sed -i 's/window.show().unwrap();/\/\/ window.show().unwrap();/' src-tauri/src/lib.rs

      - name: 初始化安卓工程
        run: pnpm tauri android init

      - name: 编译安卓APK
        run: pnpm tauri android build --release
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: Pake-Android-APK
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
