# Pake 纯安卓APP打包（修复NDK/SDK配置 + 绕过window.hide报错）
name: Pake Android APP Build (修复版)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'APP名称'
        required: true
        default: 'PakeApp'
      app_package:
        description: '包名'
        required: true
        default: 'com.xxx.pake'
      app_version:
        description: '版本号'
        required: true
        default: '1.0.0'

jobs:
  build_android:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出Pake源码
        uses: actions/checkout@v4

      - name: 配置Rust环境
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi
          components: rust-src

      - name: 配置Android NDK/SDK (修复参数报错)
        uses: android-actions/setup-android@v3
        with:
          # 这里使用 packages 关键字指定版本
          # 格式：模块;版本号
          packages: |
            cmdline-tools;latest
            ndk;26.1.10904042
            platforms;android-34
            build-tools;34.0.0
          # 必须添加这行以自动接受许可证
          accept-android-sdk-licenses: true

      - name: 安装Node/Pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 安装Pake依赖
        run: |
          npm install -g pnpm
          pnpm install

      - name: 配置APP基础信息
        run: |
          echo "TAURI_APP_TITLE=${{ github.event.inputs.app_name }}" > .env
          echo "TAURI_APP_VERSION=${{ github.event.inputs.app_version }}" >> .env
          echo "TAURI_ANDROID_PACKAGE_NAME=${{ github.event.inputs.app_package }}" >> .env
          # 绕过window.hide()报错
          echo "PAKE_SKIP_WINDOW_HIDE=true" >> .env

      - name: 初始化安卓工程
        run: pnpm tauri android init

      - name: 暴力注释报错代码 (sed命令确保生效)
        run: |
          sed -i 's/window.hide().unwrap();/\/\/ window.hide().unwrap();/g' src/lib.rs
          sed -i 's/window.show().unwrap();/\/\/ window.show().unwrap();/g' src/lib.rs

      - name: 编译安卓APP
        run: pnpm tauri android build --release
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          PAKE_SKIP_WINDOW_HIDE: true

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APP-${{ github.run_id }}
          path: |
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
