# Pake 安卓打包：彻底绕开 setup-android Action，用系统自带环境
name: Pake Android APP Build (终极版)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'APP名称'
        required: true
        default: 'PakeApp'
      app_package:
        description: '包名'
        required: true
        default: 'com.xxx.pake'
      app_version:
        description: '版本号'
        required: true
        default: '1.0.0'

jobs:
  build_android:
    runs-on: ubuntu-latest  # 用 ubuntu-latest，自带完整 Android SDK/NDK
    steps:
      - name: 检出Pake源码
        uses: actions/checkout@v4

      - name: 配置Rust环境（安卓交叉编译）
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi
          components: rust-src

      - name: 安装Node/Pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 安装Pake依赖
        run: |
          npm install -g pnpm
          pnpm install

      - name: 配置APP基础信息 + 绕过window.hide()报错
        run: |
          echo "TAURI_APP_TITLE=${{ github.event.inputs.app_name }}" > .env
          echo "TAURI_APP_VERSION=${{ github.event.inputs.app_version }}" >> .env
          echo "TAURI_ANDROID_PACKAGE_NAME=${{ github.event.inputs.app_package }}" >> .env
          echo "PAKE_SKIP_WINDOW_HIDE=true" >> .env
          # 暴力注释报错代码（兜底）
          sed -i 's/window.hide().unwrap();/\/\/ window.hide().unwrap();/g' src/lib.rs
          sed -i 's/window.show().unwrap();/\/\/ window.show().unwrap();/g' src/lib.rs

      - name: 初始化安卓工程
        run: pnpm tauri android init

      - name: 编译安卓APK（直接用系统自带NDK/SDK）
        run: pnpm tauri android build --release
        env:
          # 直接用 GitHub Runner 预装好的环境变量
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/25.2.9519653
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          PAKE_SKIP_WINDOW_HIDE: true

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APP-${{ github.run_id }}
          path: |
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
